name: Promote Release

# Workflow manual (workflow_dispatch) que promove uma imagem GHCR de um
# ambiente pra outro via re-tag. Não recompila — mantém o byte-a-byte.
#
# Aprovação humana é feita pelos GitHub Environments (staging/prod) configurados
# com `Required reviewers`. PR #4 cria os ambientes; instrutor configura
# revisores no Settings → Environments.

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Tag de origem (ex.: dev-<sha>)"
        required: true
      target_env:
        description: "Ambiente alvo"
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/px4-sitl

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute target tag
        id: tag
        run: |
          # Substitui o prefixo do ambiente (dev-<sha> → staging-<sha> → prod-<sha>).
          # Convenção: tags têm prefixo do ambiente seguido por hífen+SHA do commit.
          SRC="${{ github.event.inputs.source_tag }}"
          ENV="${{ github.event.inputs.target_env }}"
          # Extrai SHA (qualquer coisa após o primeiro '-')
          SHA="${SRC#*-}"
          TARGET="${ENV}-${SHA}"
          echo "target_tag=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "Promovendo ${SRC} → ${TARGET}"

      - name: Promote (retag)
        run: |
          python -m tools.promote_release \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --from ${{ github.event.inputs.source_tag }} \
            --to ${{ steps.tag.outputs.target_tag }}

      - name: Summary
        run: |
          echo "## ✅ Promoção concluída" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Imagem: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Origem: \`${{ github.event.inputs.source_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Destino: \`${{ steps.tag.outputs.target_tag }}\` (ambiente **${{ github.event.inputs.target_env }}**)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Sem rebuild — o mesmo SHA da imagem original agora responde por duas tags." >> $GITHUB_STEP_SUMMARY
