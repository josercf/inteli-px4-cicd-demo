name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/px4-sitl

# PR #4 (Aula 10) refatorou pipeline de paralelo → sequencial fail-fast:
# python-quality → sonar-scan → sitl-build → mission-test → quality-gates.
# Trade-off: ~30s mais lento quando tudo passa, mas economiza ~25min de runner
# self-hosted quando lint/sonar/build falham (não busca recursos cedo demais).
# Decisão didática registrada no plano da Aula 10.

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check libs/ tools/ tests/

      - name: Black
        run: black --check libs/ tools/ tests/

      - name: Mypy
        run: mypy libs/ tools/

      - name: Pytest unit + coverage
        run: pytest tests/unit -v

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  sonar-scan:
    needs: python-quality
    runs-on: ubuntu-latest
    # PR #4 LIGOU enforcement — continue-on-error: false (default).
    # Quality gate do Sonar agora bloqueia merge.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Download coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sitl-build:
    needs: sonar-scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false # Dockerfile.sitl clona PX4 internamente

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SITL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sitl
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  mission-test:
    # Unifica o antigo deploy-dev (smoke) com o novo mission-test (PR #2):
    # ambos rodavam o mesmo compose. Aqui executamos missão square_50m no
    # SITL (jmavsim), extraímos KPIs e publicamos metrics.json + comentário
    # no PR. Self-hosted (VM srv-simulador) — GitHub-hosted pendura no
    # cleanup do jmavsim/Java.
    needs: sitl-build
    runs-on: [self-hosted, px4-sitl]
    timeout-minutes: 20
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run mission compose
        env:
          SITL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set +e
          # Mesma estratégia do deploy-dev: shared netns + cleanup robusto.
          # `tester` agora executa pytest tests/sitl (smoke + mission).
          docker compose -f docker-compose.ci.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from tester \
            --timeout 5
          EXIT=$?
          # Copia reports gerados pelo container tester pra workspace antes do down.
          docker compose -f docker-compose.ci.yml cp tester:/app/reports ./reports 2>/dev/null || true
          docker compose -f docker-compose.ci.yml kill || true
          docker compose -f docker-compose.ci.yml rm -f -v || true
          exit $EXIT

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mission-metrics
          path: reports/
          if-no-files-found: warn

      - name: Comment metrics on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const metricsPath = 'reports/metrics.json';
            if (!fs.existsSync(metricsPath)) {
              console.log('reports/metrics.json não encontrado, skip comentário');
              return;
            }
            const m = JSON.parse(fs.readFileSync(metricsPath, 'utf8'));
            const body = [
              '## 📊 Métricas da missão (square_50m)',
              '',
              '| Métrica | Valor |',
              '|---|---|',
              `| Duração | ${m.mission_duration_s}s |`,
              `| Altitude máx | ${m.max_altitude_m}m |`,
              `| Altitude média | ${m.mean_altitude_m}m |`,
              `| Desvio padrão altitude cruzeiro | ${m.std_altitude_cruise_m}m |`,
              `| Aceleração máx | ${m.max_acceleration_m_s2} m/s² |`,
              `| Maior queda bateria | ${m.max_battery_drop_pct}% |`,
              `| Amostras | ${m.n_samples} |`,
              '',
              '_PR #4: quality-gates obrigatórios ativos. Vide próximo step._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  manual-approval:
    # Gate humano entre validação automática (mission-test) e o veredito dos
    # quality-gates. Força a aula a pausar e discutir o resumo de métricas
    # antes do enforcement. Configurado como required reviewers do environment
    # `quality-review` (josercf + hermanopoj). ADR-008 cobre a decisão.
    # Em push direto pra main esse job é skipped (gates seguem rodando) — só
    # bloqueia em PR, que é onde a discussão de aula acontece.
    needs: mission-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: quality-review
    timeout-minutes: 60
    steps:
      - name: Registrar aprovação
        run: |
          echo "Aprovação manual concedida por @${{ github.actor }} em $(date -u +%FT%TZ)"

  quality-gates:
    # Job NOVO do PR #4 (Aula 10): consome todos os artefatos anteriores e
    # falha o pipeline se algum threshold versionado em quality_gates.yaml for
    # violado. Bloqueia merge — protected branch deve exigir esse check.
    # Depende de manual-approval em PR; em push pra main o approval é skipped
    # mas quality-gates continua rodando.
    needs: [mission-test, manual-approval]
    if: ${{ always() && needs.mission-test.result == 'success' && (needs.manual-approval.result == 'success' || needs.manual-approval.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Download coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Download mission metrics
        uses: actions/download-artifact@v4
        with:
          name: mission-metrics
          path: reports/

      - name: Evaluate quality gates
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          python -m tools.quality_gates \
            --gates quality_gates.yaml \
            --metrics reports/metrics.json \
            --coverage coverage.xml \
            --output reports/quality_gates_result.json

      - name: Upload quality gates result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-result
          path: reports/quality_gates_result.json
          if-no-files-found: warn

      - name: Comment quality gates on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const p = 'reports/quality_gates_result.json';
            if (!fs.existsSync(p)) {
              console.log('quality_gates_result.json não encontrado, skip');
              return;
            }
            const r = JSON.parse(fs.readFileSync(p, 'utf8'));
            const emoji = r.all_passed ? '✅' : '❌';
            const rows = r.results.map(g => `| ${g.passed ? '✅' : '❌'} | \`${g.name}\` | ${g.message} |`).join('\n');
            const body = [
              `## ${emoji} Quality Gates — ${r.summary}`,
              '',
              '| | Gate | Detalhe |',
              '|---|---|---|',
              rows,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
