name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/px4-sitl

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check libs/ tests/

      - name: Black
        run: black --check libs/ tests/

      - name: Mypy
        run: mypy libs/

      - name: Pytest unit + coverage
        run: pytest tests/unit -v

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  sonar-scan:
    needs: python-quality
    runs-on: ubuntu-latest
    continue-on-error: true # PR #1: análise sem enforcement; PR #4 ativa enforcement
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Sonar precisa de histórico para git blame
          submodules: false

      - name: Download coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sitl-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false # Dockerfile.sitl clona PX4 internamente (Makefile exige .git real)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SITL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sitl
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy-dev:
    needs: sitl-build
    # Runner self-hosted (VM srv-simulador): GitHub-hosted ficava preso ao
    # parar jmavsim Java (não responde a SIGTERM), causando timeout no job
    # mesmo após o teste passar. Self-hosted permite cleanup mais robusto e
    # cache local da imagem SITL.
    runs-on: [self-hosted, px4-sitl]
    timeout-minutes: 15
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull SITL image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run smoke test (compose)
        env:
          SITL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set +e
          # --timeout 5: jmavsim Java + PX4 não respondem rápido a SIGTERM;
          # corta esperar shutdown limpo após tester sair com exit code.
          docker compose -f docker-compose.ci.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from tester \
            --timeout 5
          EXIT=$?
          docker compose -f docker-compose.ci.yml kill || true
          docker compose -f docker-compose.ci.yml rm -f -v || true
          exit $EXIT

      - name: SITL logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs sitl 2>&1 | tail -100 || true
