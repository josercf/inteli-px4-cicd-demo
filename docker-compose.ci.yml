# CI: usa imagem SITL pré-publicada no GHCR (variável SITL_IMAGE).
# Tester é buildado local (rápido, ~50MB).
# Uso: SITL_IMAGE=ghcr.io/josercf/px4-sitl:<sha> docker compose -f docker-compose.ci.yml up --abort-on-container-exit --exit-code-from tester
services:
  sitl:
    image: ${SITL_IMAGE:?SITL_IMAGE must be set}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x px4 || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 90s
      retries: 12

  tester:
    build:
      context: .
      dockerfile: docker/Dockerfile.tools
    # Compartilha o network namespace do sitl: localhost do tester == localhost
    # do sitl. PX4 SITL por padrão emite MAVLink em localhost (não broadcast),
    # então essa é a única forma de o tester receber heartbeats sem reconfigurar
    # PX4. Trade-off: depends_on com healthcheck ainda funciona, mas não pode
    # ter networks: aqui (conflito com network_mode).
    network_mode: "service:sitl"
    depends_on:
      sitl:
        condition: service_healthy
    environment:
      - MAVLINK_URL=udpin:127.0.0.1:14540
